services:
  db:
    image: postgres:17-alpine
    container_name: gestao-streaming-db
    environment:
      POSTGRES_DB: gestao_streaming
      POSTGRES_USER: gestao
      POSTGRES_PASSWORD: gestao
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gestao -d gestao_streaming"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
    container_name: gestao-streaming-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/gestao_streaming
      SPRING_DATASOURCE_USERNAME: gestao
      SPRING_DATASOURCE_PASSWORD: gestao
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      TMDB_API_TOKEN: ${TMDB_API_TOKEN:-eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiJkM2UwYTkwOGRkMDVhMWNmNDQwZDQ1OTM2Y2FjYmY2NSIsIm5iZiI6MTc4MTk1NjM2Ny43OTAwMDAyLCJzdWIiOiI2YTM2N2YwZjc2MWFmOWMwYjFlNmZkNmIiLCJzY29wZXMiOlsiYXBpX3JlYWQiXSwidmVyc2lvbiI6MX0.w_huCVIHcg7YjMJmqvxwz9jSWQDrbZHaxmMNwvBOPfk}
    ports:
      - "8080:8080"

volumes:
  postgres-data:
